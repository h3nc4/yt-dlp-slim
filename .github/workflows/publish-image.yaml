name: Publish Docker Image

on:
  push:
    branches:
      - "main"
    paths:
      - "Dockerfile"
      - "alpine.Dockerfile"
      - ".github/workflows/publish-image.yaml"
  pull_request:
    branches:
      - "main"
    paths:
      - "Dockerfile"
      - "alpine.Dockerfile"
      - ".github/workflows/publish-image.yaml"

jobs:
  build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dockerfile: Dockerfile
            tag: latest
            sha_prefix: ""
          - dockerfile: alpine.Dockerfile
            tag: alpine
            sha_prefix: "alpine-"
    steps:
      - name: Run actions/checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run docker/setup-buildx-action
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Run docker/login-action
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Run docker/build-push-action
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}:${{ matrix.tag }}
            ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}:${{ matrix.sha_prefix }}${{ steps.sha.outputs.short }}
